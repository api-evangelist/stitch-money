aid: stitch-money
url: https://raw.githubusercontent.com/api-evangelist/stitch-money/refs/heads/main/apis.yml
name: Stitch
kind: company
description: Stitch is a South African payments and open-banking infrastructure company.
  Its single GraphQL API at https://api.stitch.money/graphql powers Pay By Bank (instant
  EFT) and LinkPay payment initiation, bank account verification, financial data access
  (accounts, transactions, balances), payouts and disbursements, refunds, and signed
  webhook subscriptions, authenticated via OAuth2 client-credentials Bearer tokens.
image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
tags:
- Payments
- Open Banking
- Pay By Bank
- GraphQL
- Africa
- South Africa
- Fintech
created: '2026-06-21'
modified: '2026-06-21'
specificationVersion: '0.19'
apis:
- aid: stitch-money:payments-pay-by-bank
  name: Stitch Payments (Pay By Bank)
  tags:
  - Payments
  - Pay By Bank
  - Instant EFT
  - GraphQL
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
