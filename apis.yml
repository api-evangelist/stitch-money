  - url: openapi/stitch-money-openapi.yml
    type: OpenAPI
  - url: graphql/stitch-money-graphql.md
    type: GraphQL
  - url: collections/stitch-money.postman_collection.json
    type: Postman
  description: Bank account verification via the verifyBankAccountDetails GraphQL
    query, confirming account holder name, account number, and bank against the
    BankAccountVerificationInput and returning a VerifiedBankAccountDetails breakdown.
