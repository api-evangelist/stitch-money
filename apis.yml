    type: Documentation
  - url: https://docs.stitch.money/api
    type: APIReference
  - url: openapi/stitch-money-openapi.yml
    type: OpenAPI
  - url: graphql/stitch-money-graphql.md
    type: GraphQL
  - url: collections/stitch-money.postman_collection.json
    type: Postman
  description: Pay By Bank (instant EFT) and LinkPay payment initiation via the
    clientPaymentInitiationRequestCreate and clientPaymentAuthorizationRequestCreate
    GraphQL mutations, with payment status queried through the Relay node field and
    completion delivered by signed webhooks.
- aid: stitch-money:account-verification
  name: Stitch Account Verification API
  tags:
  - Account Verification
  - Bank Account
  - KYC
