    type: OpenAPI
  - url: graphql/stitch-money-graphql.md
    type: GraphQL
  - url: collections/stitch-money.postman_collection.json
    type: Postman
  description: Full and partial refunds against a prior Pay By Bank or Card payment via
    the clientRefundInitiate GraphQL mutation, referencing the originalPaymentId of a
    payment initiation request or card transaction.
- aid: stitch-money:webhooks
  name: Stitch Webhooks and Subscriptions API
