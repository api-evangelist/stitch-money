    type: OpenAPI
  - url: graphql/stitch-money-graphql.md
    type: GraphQL
  - url: collections/stitch-money.postman_collection.json
    type: Postman
  description: Outbound disbursements and payouts to beneficiary bank accounts via the
    clientDisbursementInitiate GraphQL mutation, using amount, destination account
    details, a beneficiary reference, and a nonce to enforce idempotent uniqueness.
