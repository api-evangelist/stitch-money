meters:
- name: pay_by_bank_transactions
  description: Pay By Bank / LinkPay payment initiation requests processed, billed per transaction.
  unit: transactions
  aggregation: sum
  dimensions:
  - client
  - product
- name: card_transactions
  description: Card payment transactions processed, billed per transaction.
  unit: transactions
  aggregation: sum
  dimensions:
  - client
- name: account_verifications
  description: Bank account verification calls, billed per verification.
  unit: verifications
  aggregation: sum
  dimensions:
  - client
- name: financial_data_requests
  description: User financial data access (linked accounts / data pulls), billed per linked account or request.
  unit: requests
  aggregation: sum
  dimensions:
  - client
- name: disbursements
  description: Outbound disbursements / payouts, billed per payout.
  unit: transactions
  aggregation: sum
  dimensions:
  - client
- name: refunds
  description: Refunds issued against prior payments, billed per refund.
  unit: transactions
  aggregation: sum
  dimensions:
  - client
principles:
- name: Visibility
  description: Reconcile Stitch settlement statements and invoices; track effective per-product transaction fees.
- name: Allocation
  description: Tag clients / products and map processed-payment fees to internal cost centers and merchants.
- name: Optimization
  description: Route to the lowest-cost rail per use case (Pay By Bank vs card), reuse LinkPay tokens for returning payers, and negotiate volume-tiered rates.
- name: Accountability
  description: Assign owners per client / product line; review processing fees monthly against payment volume.
