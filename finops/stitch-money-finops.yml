description: >-
  FinOps view of Stitch spend. Stitch bills on a per-transaction, sales-led
  basis across its payment and data products - Pay By Bank and LinkPay payment
  initiation, card, bank account verification, financial data access,
  disbursements, and refunds. Fees are typically a percentage and/or flat
  per-transaction amount negotiated by volume, settled against processed
  payments. Public list rates are not published, so per-product effective
  rates must be reconciled from invoices and the negotiated agreement.
notes: >-
  Per-transaction rates are sales-led and not publicly reconciled. Pull
  effective rates from the Stitch agreement and settlement statements during
  reconciliation.
